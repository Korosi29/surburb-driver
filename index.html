<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta property="og:image" content="https://i.imgur.com/q4vDc5Y.jpeg" />
        <meta property="og:title" content="The Surburb Driver" />
        <meta property="og:description" content="Drive through the surburb" />

        <!-- Modular CSS -->
        <link rel="stylesheet" href="css/base.css" />
        <link rel="stylesheet" href="css/road.css" />
        <link rel="stylesheet" href="css/car1.css" />
        <link rel="stylesheet" href="css/car2.css" />
        <link rel="stylesheet" href="css/controls.css" />
        <link rel="stylesheet" href="css/ui.css" />

        <!-- Asset preloads -->
        <link rel="preload" href="assets/images/road.jpg" as="image" />
        <link rel="preload" href="assets/images/main.jpg" as="image" />
        <link rel="preload" href="assets/images/mypic.jpg" as="image" />
        <link rel="preload" href="assets/images/car1.png" as="image" />
        <link rel="preload" href="assets/images/car2.png" as="image" />
        <link rel="preload" href="assets/images/brake.png" as="image" />
        <link rel="preload" href="assets/images/control.png" as="image" />
        <link rel="preload" href="assets/images/full-beam.png" as="image" />
        <link rel="preload" href="assets/images/ignition.png" as="image" />
        <link rel="preload" href="assets/images/low-beam.png" as="image" />
        <link rel="preload" href="assets/images/pause.png" as="image" />
        <link rel="preload" href="assets/images/signal.png" as="image" />
        <link rel="preload" href="assets/images/throttle.png" as="image" />

        <title>Surburb Driver</title>
    </head>
    <body>
        <div class="my-game">
            <div id="main-road-con">
                <div id="lane-container">
                    <!-- Lane divider lines -->
                    <div id="lanes"></div>
                </div>

                <!-- Car 1 — Player car -->
                <div id="c1-container">
                    <img src="assets/images/car1.png" alt="default car" id="car1" />
                    <div class="c1-headlight-left"></div>
                    <div class="c1-headlight-right"></div>
                    <div class="c1-turn-sig-front-left c1-turn-sig"></div>
                    <div class="c1-turn-sig-front-right c1-turn-sig"></div>
                    <div class="c1-turn-sig-back-left c1-turn-sig"></div>
                    <div class="c1-turn-sig-back-right c1-turn-sig"></div>
                    <div class="c1-mid-tail-light"></div>
                    <div class="c1-tail-light-left"></div>
                    <div class="c1-tail-light-right"></div>
                </div>

                <!-- Car 2 — NPC car -->
                <div class="c2-container">
                    <img src="assets/images/car2.png" alt="optional car" id="car2" />
                    <div class="c2-headlight-left"></div>
                    <div class="c2-headlight-right"></div>
                    <div class="c2-turn-sig-front-left"></div>
                    <div class="c2-turn-sig-front-right"></div>
                    <div class="c2-turn-sig-back-left"></div>
                    <div class="c2-turn-sig-back-right"></div>
                    <div class="c2-tail-light-left"></div>
                    <div class="c2-tail-light-right"></div>
                </div>
            </div>

            <!-- Game controls -->
            <div class="car-controls">
                <!-- Primary controls -->
                <img src="assets/images/control.png" alt="control arrow" class="control-icons control-right" id="control-right" />
                <img src="assets/images/control.png" alt="control arrow" class="control-icons control-left" id="control-left" />
                <img src="assets/images/throttle.png" alt="throttle icon" class="control-icons throttle-icon" oncontextmenu="return false;" />
                <img src="assets/images/brake.png" alt="brake icon" class="control-icons brake-icon" />

                <div class="ignition-icon-con">
                    <img src="assets/images/ignition.png" alt="ignition icon" onclick="startStopEngine()" />
                    <div class="ignition-indicator"></div>
                </div>

                <!-- Gear indicator -->
                <div class="gear-con">
                    <div class="gears reverse-gear" id="reverse"><span>R</span></div>
                    <div class="gears neutral-gear" id="neutral"><span class="neutral">P</span></div>
                    <div class="gears" id="gear1"><span>1</span></div>
                    <div class="gears" id="gear2"><span>2</span></div>
                    <div class="gears" id="gear3"><span>3</span></div>
                    <div class="gears" id="gear4"><span>4</span></div>
                    <div class="gears" id="gear5"><span>5</span></div>
                    <div class="gears" id="gear6"><span>6</span></div>
                </div>

                <!-- Secondary controls -->
                <img src="assets/images/full-beam.png" alt="full beam icon" class="control-icons full-beam" />
                <img src="assets/images/low-beam.png" alt="low beam icon" class="control-icons low-beam" />
                <img src="assets/images/signal.png" alt="turn signal left" class="control-icons turn-left" />
                <img src="assets/images/signal.png" alt="turn signal right" class="control-icons turn-right" />
            </div>

            <!-- Pause button -->
            <div id="pause">
                <img src="assets/images/pause.png" onclick="pause()" />
            </div>

            <!-- Main menu overlay -->
            <div class="menu-con">
                <div class="menu-inner-con">
                    <div class="play" onclick="play()">Play</div>
                    <div class="about" onclick="goToAboutPage()">About Developer</div>
                    <div class="kgames">@ KGames &copy;2024</div>
                </div>
            </div>

            <!-- Loading screen -->
            <div class="loading-main">
                <div class="loading-inner"></div>
                <div class="loading-bar-con">
                    <div class="loading-bar"></div>
                    <div class="loading-text">Loading...</div>
                    <div class="version-number">version 1.1</div>
                </div>
            </div>
        </div>

        <!-- Modular JS — order matters -->
        <script src="js/car.js"></script>
        <script src="js/engine.js"></script>
        <script src="js/gears.js"></script>
        <script src="js/controls.js"></script>
        <script src="js/lights.js"></script>
        <script src="js/ui.js"></script>
    </body>
</html>
